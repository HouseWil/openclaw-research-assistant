skills:
- id: weather
  name: 实时天气
  description: 查询任意城市的实时天气（通过 wttr.in）
  enabled: true
  parameters:
    location: 城市名或地名（英文，如 Beijing）
  arg_schema:
    type: object
    properties:
      location:
        type: string
        description: 城市名或地名（建议英文）
    required:
    - location
  execution:
    type: http
    method: GET
    endpoint: https://wttr.in/{location}?format=j1
    timeout_seconds: 10
    retries: 1
    allowed_domains:
    - wttr.in
    result_path: current_condition.0
    result_template: '{result}'
    query: {}
    headers: {}
- id: web_search
  name: 网络搜索
  description: 搜索互联网获取最新信息
  enabled: false
  parameters:
    search_engine: google
    max_results: '5'
- id: paper_reader
  name: 论文阅读
  description: 解析和总结学术论文
  enabled: true
  parameters:
    supported_formats:
    - pdf
    - arxiv
    summary_length: medium
- id: code_executor
  name: 代码执行
  description: 执行 Python 代码片段
  enabled: false
  parameters:
    timeout: 30
    allowed_libraries:
    - numpy
    - pandas
    - matplotlib
- id: citation_manager
  name: 引用管理
  description: 管理和格式化学术引用
  enabled: true
  parameters:
    default_style: APA
    supported_styles:
    - APA
    - MLA
    - Chicago
    - IEEE
